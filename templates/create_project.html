{% extends 'base.html' %}
{% block title %}Post Project{% endblock %}
{% block content %}
<div class="card" style="max-width: 700px; margin: 0 auto;">
    <h2>Post a New Project</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group"><label class="form-label">Project Title</label><input type="text" name="title" class="form-input" required></div>
        <div class="form-group"><label class="form-label">Description</label><textarea name="description" class="form-textarea" required></textarea></div>
        <div class="form-group"><label class="form-label">Requirements</label><textarea name="requirements" class="form-textarea" required></textarea></div>
        <div class="grid grid-2">
            <div class="form-group"><label class="form-label">Bidding Deadline</label><input type="datetime-local" name="deadline" class="form-input" required></div>
            <div class="form-group"><label class="form-label">Offer Price ($)</label><input type="number" name="offer_price" class="form-input" step="0.01" min="1" required></div>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Post Project</button>
    </form>
</div>
{% endblock %}
